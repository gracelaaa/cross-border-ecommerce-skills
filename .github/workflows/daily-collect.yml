name: Daily Demand Signal Collection

on:
  schedule:
    # 每天早上 9:00 精准 9 sub
    - cron: '0 1 * * *'
    # 每天凌晨 2:00 宽网搜索
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      collector:
        description: 'Which collector to run'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - reddit
          - reddit_broad

# GITHUB_TOKEN needs write access to push to data branch
permissions:
  contents: write

jobs:
  # Determine which collector(s) to run based on trigger
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        collector: [reddit, reddit_broad]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
          pip install apify-client

      - name: Decide whether to run this collector
        id: should_run
        env:
          COLLECTOR: ${{ matrix.collector }}
          INPUT_COLLECTOR: ${{ github.event.inputs.collector }}
        run: |
          HOUR=$(date -u +%H)
          EVENT="${{ github.event_name }}"
          INPUT="${{ github.event.inputs.collector }}"

          # Default: don't run
          RUN="false"

          if [ "$EVENT" = "schedule" ]; then
            # Scheduled: match by hour
            if [ "$HOUR" = "01" ] && [ "$COLLECTOR" = "reddit" ]; then
              RUN="true"
            elif [ "$HOUR" = "18" ] && [ "$COLLECTOR" = "reddit_broad" ]; then
              RUN="true"
            fi
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            # Manual: respect input choice
            if [ "$INPUT" = "both" ] || [ "$INPUT" = "$COLLECTOR" ] || [ -z "$INPUT" ]; then
              RUN="true"
            fi
          fi

          echo "run=$RUN" >> $GITHUB_OUTPUT
          echo "Will run $COLLECTOR: $RUN (event=$EVENT hour=$HOUR input=$INPUT)"

      - name: Collect demand signals
        if: steps.should_run.outputs.run == 'true'
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          cd pipeline
          if [ "${{ matrix.collector }}" = "reddit" ]; then
            echo "📌 Running targeted 9-sub collection..."
            python run.py --only reddit --daily
          else
            echo "🌐 Running broad search collection..."
            python run.py --only reddit_broad
          fi

      - name: Export data to JSON/CSV
        if: steps.should_run.outputs.run == 'true'
        run: |
          python -c "
          import sqlite3, json, csv, os
          db = sqlite3.connect('pipeline/demand_signals.db')
          db.row_factory = sqlite3.Row
          rows = db.execute('SELECT * FROM demand_signals').fetchall()
          data = [dict(r) for r in rows]
          for row in data:
              for col in ['keywords', 'metadata']:
                  if row.get(col):
                      try: row[col] = json.loads(row[col])
                      except: pass
          os.makedirs('data', exist_ok=True)
          with open('data/demand_signals.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          for row in data:
              row['keywords'] = json.dumps(row.get('keywords', []), ensure_ascii=False)
              row['metadata'] = json.dumps(row.get('metadata', {}), ensure_ascii=False)
          with open('data/demand_signals.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.DictWriter(f, fieldnames=data[0].keys())
              writer.writeheader()
              writer.writerows(data)
          db.close()
          print(f'Exported {len(data)} signals')
          "

      - name: Push data to data branch
        if: steps.should_run.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Fetch existing data branch to avoid clobbering the other job's push
          git fetch origin data 2>/dev/null || true
          git checkout data 2>/dev/null || git checkout -b data
          # Merge any existing data from the other parallel job
          git merge origin/data --no-edit 2>/dev/null || true
          git add data/
          git commit -m "data: ${{ matrix.collector }} update $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "No changes"
          # Retry push in case the other job is pushing simultaneously
          for i in 1 2 3; do
            if git push origin data --force-with-lease; then
              break
            fi
            echo "Push failed, retrying in 10s..."
            sleep 10
            git fetch origin data
            git merge origin/data --no-edit 2>/dev/null || true
          done
