name: Daily Demand Signal Collection

on:
  schedule:
    # 每天 UTC 1:00 (北京时间 9:00) 运行精准 9 sub
    - cron: '0 1 * * *'
    # 每天 UTC 18:00 (北京时间 2:00) 运行宽网搜索
    - cron: '0 18 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
          pip install apify-client
      
      - name: Run Reddit targeted collection (9 subs)
        if: github.event.schedule == '0 1 * * *' || github.event_name == 'workflow_dispatch'
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          cd pipeline
          python run.py --only reddit --daily
      
      - name: Run Reddit broad collection (all subs)
        if: github.event.schedule == '0 18 * * *' || github.event_name == 'workflow_dispatch'
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          cd pipeline
          python run.py --only reddit_broad
      
      - name: Export data to JSON/CSV
        run: |
          python -c "
          import sqlite3, json, csv, os
          db = sqlite3.connect('pipeline/demand_signals.db')
          db.row_factory = sqlite3.Row
          rows = db.execute('SELECT * FROM demand_signals').fetchall()
          data = [dict(r) for r in rows]
          for row in data:
              for col in ['keywords', 'metadata']:
                  if row.get(col):
                      try: row[col] = json.loads(row[col])
                      except: pass
          os.makedirs('data', exist_ok=True)
          with open('data/demand_signals.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          for row in data:
              row['keywords'] = json.dumps(row.get('keywords', []), ensure_ascii=False)
              row['metadata'] = json.dumps(row.get('metadata', {}), ensure_ascii=False)
          with open('data/demand_signals.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.DictWriter(f, fieldnames=data[0].keys())
              writer.writeheader()
              writer.writerows(data)
          db.close()
          print(f'Exported {len(data)} signals')
          "
      
      - name: Push data to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout data 2>/dev/null || git checkout -b data
          git add data/
          git commit -m "data: daily update $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "No changes"
          git push origin data --force
