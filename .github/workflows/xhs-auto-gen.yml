name: XHS Auto Gen

on:
  schedule:
    # 每天 09:00 UTC = 北京时间 17:00
    - cron: '0 9 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许 commit 生成的笔记

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run pipeline
        env:
          DATA_URL: https://raw.githubusercontent.com/${{ github.repository }}/data/data/demand_signals.json
          OUTPUT_DIR: output/xhs-notes
          MAX_NOTES_PER_RUN: 3
          MIN_CONTENT_LENGTH: 300
        run: |
          cd skills/xhs-auto-gen
          python3 pipeline.py

      - name: Commit and push generated notes
        run: |
          git config user.name "xhs-auto-gen[bot]"
          git config user.email "xhs-auto-gen[bot]@users.noreply.github.com"
          git add output/xhs-notes/
          git diff --staged --quiet || git commit -m "🤖 Auto-generate XHS notes $(date +%Y-%m-%d)"
          git push
